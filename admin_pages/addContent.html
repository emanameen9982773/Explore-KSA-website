
<!DOCTYPE html>
<html lang="ar">

<head>
    <title>إضافة منطقة جديدة</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <a href="dashboard.php">لوحة التحكم المشرف</a>
                <a href="../public_pages/regionsGallary.php">معرض المناطق</a>
                <a href="AdminLogin.php">تسجيل خروج</a>
            </ul>
        </nav>
    </header>

    <main>
        <h1>إضافة منطقة جديدة</h1>
        <p>ادخل معلومات المنطقة:</p>

        <form action="addRegionLogic.php" method="POST" enctype="multipart/form-data">
            <div>
                <label for="region_name">اسم المنطقة</label>
                <input type="text" name="region_name">
            </div>

            <div>
                <label for="leadline">وصف مختصر</label>
                <input type="text" name="headline" placeholder="يظهر اسفل اسم المنطقة في صفحة معرض المناطقة">
            </div>
            
            
            <div>
                <label for="nature">طبيعة المنطقة</label>
                <select name="nature">
                    <option value="" disabled selected>-- اختر نوع الطبيعة --</option>
                    <option value="صحراوية">صحراوية</option>
                    <option value="جبلية">جبلية</option>
                    <option value="ساحلية">ساحلية</option>
                    <option value="زراعية">زراعية/ريفية</option>
                    <option value="بركانية">بركانية/حرات</option>
                    <option value="جزيرة">جزيرة</option>
                </select>
            </div>

            <div>
                <label for="location">موقعها بالنسبة للمملكة</label>
                <select name="location" >
                    <option value="" disabled selected>--اختر موقعا--</option>
                    <option value="شمال">شمال المملكة</option>
                    <option value="جنوب">جنوب المملكة</option>
                    <option value="شرق">شرق المملكة</option>
                    <option value="غرب">غرب المملكة</option>
                    <option value="وسط">وسط المملكة</option>
                </select>
            </div>

            <div>
                <label for="landmarks">ابرز المعالم السياحية</label>
                <div> 
                    <input type="text" name="landmarks[]" placeholder="المعلم الاول">
                    <button type="button" onclick="addInput()">+</button>
                </div>
            </div>


            <div>
                <label for="activities[]">أبرز الأنشطة</label>
                <div class="activity-array"> 
                    <input type="text" name="activities[]" placeholder="مثال: الغوص ، ممارسة شعائر دينية">
                    <button type="button" onclick="addInput()">+</button>
                </div>
            </div>

            <div>
                <label for="description">وصف المنطقة</label>
                <input type="text" name="description" placeholder="معلومات عامة عن المنطقة-لا تظهر الا عند استعراض تفاصيل المنطقة">
            </div>

            <div>
                <label for="icon">الصورة الرئيسية للمنطقة</label>
                <input type="file" id="icon" name="icon" accept="image/*">
            </div>

            
            <div>
                <label for="images">صور اضافية</label>
                <div id="images-container">
                    <input type="file" name="images[]" accept="image/*">
                    <button type="button" onclick="addInput()">+</button>
                </div>
            </div>

            <button id="addRegion" type="submit" >إضافة</button>


        </form>

    </main>

    <footer>  
        <p>استكشف جمال المملكة</p>
    </footer>

</body>

</html>
